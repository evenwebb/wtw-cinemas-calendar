name: Update Cinema iCal Feed

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-cinema-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      CREATE_FAILURE_ISSUE: ${{ secrets.CREATE_FAILURE_ISSUE || 'true' }}
      SCRAPER_RUN_ATTEMPTS: ${{ secrets.SCRAPER_RUN_ATTEMPTS || '2' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        env:
          UV_SYSTEM_PYTHON: 1
        run: uv pip install -r requirements.txt

      - name: Generate Cinema iCal (with retries)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          mkdir -p logs
          ATTEMPTS="${SCRAPER_RUN_ATTEMPTS:-2}"
          if [ "$ATTEMPTS" -lt 1 ]; then ATTEMPTS=1; fi
          attempt=1
          while [ "$attempt" -le "$ATTEMPTS" ]; do
            echo "Scraper attempt $attempt/$ATTEMPTS"
            if python cinema_scraper.py 2>&1 | tee logs/scraper.log; then
              echo "Scraper completed successfully"
              exit 0
            fi
            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              sleep_seconds=$((attempt * 20))
              echo "Attempt $attempt failed; retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
            attempt=$((attempt + 1))
          done
          echo "All scraper attempts failed"
          exit 1

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d docs ]; then git add docs/; fi
          for f in .film_cache.json .tmdb_cache.json .release_history.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update WTW Cinema iCal file"
          git push

      - name: Upload failure logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-failure-logs-${{ github.run_id }}
          retention-days: 7
          path: logs/
          if-no-files-found: ignore

      - name: Create or update failure issue
        if: failure() && env.CREATE_FAILURE_ISSUE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const crypto = require("crypto");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "WTW Cinema scraper failure";
            const labels = ["automation", "scraper-failure"];
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            let logSnippet = "";
            try { logSnippet = fs.readFileSync("logs/scraper.log", "utf8").slice(-8000); } catch (e) {}

            const stableLines = logSnippet
              .split(/\r?\n/)
              .filter(l => /error|failed|traceback|exception|warning/i.test(l))
              .slice(-60).join("\n");
            const sig = crypto.createHash("sha256")
              .update(stableLines || logSnippet).digest("hex").slice(0, 16);
            const sigMarker = `<!-- failure-signature:${sig} -->`;
            const streakPattern = /<!--\s*success-streak:(\d+)\s*-->/i;

            function resetStreak(body) {
              const marker = "<!-- success-streak:0 -->";
              if (!body) return marker;
              return streakPattern.test(body) ? body.replace(streakPattern, marker) : body + "\n" + marker;
            }

            const body = [
              sigMarker,
              "The WTW Cinema scraper workflow failed after configured retries.",
              "",
              `- Failure Signature: \`${sig}\``,
              `- Workflow: ${context.workflow}`,
              `- Job: ${context.job}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              "",
              "### Log excerpt",
              "```text", (logSnippet || "No logs captured.").slice(-60000), "```",
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: "all", labels: labels.join(","), per_page: 100
            });

            let issue = existing.data.find(i => i.title === title && (i.body || "").includes(sigMarker));
            if (!issue) {
              for (const i of existing.data) {
                if (i.title !== title) continue;
                const comments = await github.rest.issues.listComments({
                  owner, repo, issue_number: i.number, per_page: 100
                });
                if (comments.data.some(c => (c.body || "").includes(sigMarker))) {
                  issue = i; break;
                }
              }
            }

            if (issue) {
              if (issue.state === "closed") {
                await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: "open" });
              }
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, body: resetStreak(issue.body) });
            } else {
              const match = existing.data.find(i => i.title === title);
              if (match) {
                await github.rest.issues.createComment({ owner, repo, issue_number: match.number, body });
              } else {
                await github.rest.issues.create({ owner, repo, title, body: resetStreak(body), labels });
              }
            }

      - name: Auto-close stale failure issue after 2 successful runs
        if: success() && env.CREATE_FAILURE_ISSUE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "WTW Cinema scraper failure";
            const labels = ["automation", "scraper-failure"];
            const streakPattern = /<!--\s*success-streak:(\d+)\s*-->/i;
            function getStreak(body) { const m = (body || "").match(streakPattern); return m ? parseInt(m[1], 10) : 0; }
            function setStreak(body, v) {
              const marker = `<!-- success-streak:${v} -->`;
              if (!body) return marker;
              return streakPattern.test(body) ? body.replace(streakPattern, marker) : body + "\n" + marker;
            }

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: labels.join(","), per_page: 100
            });
            const issue = existing.data.find(i => i.title === title);
            if (!issue) return;
            const next = getStreak(issue.body) + 1;
            if (next >= 2) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: "Auto-closing after 2 consecutive successful runs."
              });
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: "closed", body: setStreak(issue.body, next) });
            } else {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, body: setStreak(issue.body, next) });
            }
